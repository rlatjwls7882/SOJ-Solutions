name: Update README

on:
  # schedule:
  #   - cron: '0 */6 * * *'
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm

      - name: Check SOJ connection
        run: |
          echo "=== DNS ==="
          getent ahosts soj.services || true

          echo "=== IPv4 ==="
          curl -4 -v --connect-timeout 10 --max-time 20 \
            "https://soj.services/api/problems?page=0&size=1" || true

          echo "=== IPv6 ==="
          curl -6 -v --connect-timeout 10 --max-time 20 \
            "https://soj.services/api/problems?page=0&size=1" || true

      - name: Update README
        env:
          SOJ_BASE_URL: https://soj.services
          SOJ_API_BASE: https://soj.services/api
          FAIL_ON_API_ERROR: true
        run: |
          python update_README.py

      - name: Commit and push changes
        run: |
          git config --global user.email "rlatjwls7882@gmail.com"
          git config --global user.name "rlatjwls7882"

          if git diff --quiet README.md; then
            echo "README.md has no changes."
            exit 0
          fi

          git add README.md
          git commit -m "Update README.md"
          git push
